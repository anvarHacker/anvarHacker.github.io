<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Access</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  height: 100%;
}

.container {
  padding: 15px;
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

.line {
  white-space: nowrap;
  overflow: hidden;
  border-right: 2px solid #00ff00;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

.popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 1px solid #00ff00;
  padding: 10px 20px;
  display: none;
}
</style>
</head>

<body>

<div class="container" id="terminal"></div>
<div class="popup" id="popup">⚠️ Unauthorized Access Detected</div>

<script>
const lines = [
  "Initializing system...",
  "Bypassing security...",
  "Accessing iPhone data...",
  "Downloading contacts...",
  "Uploading to server...",
  "Injecting payload...",
  "WARNING: Device compromised",
  "Just kidding 😄"
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine(text, callback) {
  let index = 0;
  let div = document.createElement("div");
  terminal.appendChild(div);

  function type() {
    if (index < text.length) {
      div.textContent += text.charAt(index);
      index++;
      setTimeout(type, 30);
    } else {
      if (callback) callback();
    }
  }
  type();
}

function runLines() {
  if (i < lines.length) {
    typeLine(lines[i], () => {
      i++;
      if (i === 5) {
        document.getElementById("popup").style.display = "block";
      }
      setTimeout(runLines, 500);
    });
  }
}

runLines();
</script>

</body>
</html>
